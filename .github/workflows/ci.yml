name: CI

on:
  pull_request:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

jobs:
  guardrails:
    name: Repository guardrails
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Run deterministic repository guardrails
        run: node --test tests/ci-container-readiness.test.mjs

  validate:
    name: Typecheck, build, and test
    runs-on: ubuntu-latest
    needs: guardrails

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Typecheck
        run: npm run typecheck

      - name: Build
        run: npm run build

      - name: Test
        run: npm test

  container:
    name: Container build
    runs-on: ubuntu-latest
    needs: guardrails

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Build runtime image without pushing
        run: docker build --pull --tag swooshz-platform:ci .
